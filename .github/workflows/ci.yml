name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      APPROVED_CONFIG_HASH: ${{ vars.APPROVED_CONFIG_HASH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build live write attestation
        run: python scripts/build_live_write_attestation.py

      - name: Upload live write attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-write-attestation
          path: |
            contracts/kabucom_live_write_attestation.json
            contracts/kabucom_live_write_attestation.json.sha256
          if-no-files-found: ignore
